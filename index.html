<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ Galaxy</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-height: 100%; }
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle at 20% 10%, rgba(56, 189, 248, 0.15), transparent 20%),
                        radial-gradient(circle at 85% 15%, rgba(168, 85, 247, 0.16), transparent 18%),
                        radial-gradient(circle at 50% 30%, rgba(59, 130, 246, 0.12), transparent 30%),
                        linear-gradient(180deg, #070b18 0%, #090c19 45%, #0f1226 100%);
            color: #eef2ff;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 30% 12%, rgba(120, 211, 255, 0.22), transparent 15%),
                        radial-gradient(circle at 15% 70%, rgba(255, 255, 255, 0.08), transparent 20%),
                        radial-gradient(circle at 85% 25%, rgba(183, 147, 255, 0.16), transparent 18%);
            pointer-events: none;
        }
        .wrapper {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 1;
        }
        .stars {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.9;
            animation: twinkle 4s infinite ease-in-out, fall 8s infinite linear;
        }
        .star::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 60%);
            opacity: 0.5;
        }
        .star:nth-child(1)  { top: 10%; left: 15%; animation-duration: 6s, 10s; animation-delay: 0s, 0s; }
        .star:nth-child(2)  { top: 22%; left: 72%; animation-duration: 4s, 8s; animation-delay: 0.8s, 1s; }
        .star:nth-child(3)  { top: 38%; left: 45%; animation-duration: 5s, 9s; animation-delay: 0.4s, 0.6s; }
        .star:nth-child(4)  { top: 55%; left: 12%; animation-duration: 4.2s, 7.5s; animation-delay: 1.2s, 0.2s; }
        .star:nth-child(5)  { top: 72%; left: 80%; animation-duration: 5.6s, 6.8s; animation-delay: 0.7s, 0.3s; }
        .star:nth-child(6)  { top: 85%; left: 35%; animation-duration: 7s, 11s; animation-delay: 0.2s, 0.5s; }
        .star:nth-child(7)  { top: 30%; left: 25%; animation-duration: 4.8s, 9.2s; animation-delay: 1.4s, 0.9s; }
        .star:nth-child(8)  { top: 15%; left: 88%; animation-duration: 6.2s, 8.6s; animation-delay: 0.3s, 0.4s; }
        .star:nth-child(9)  { top: 68%; left: 52%; animation-duration: 3.8s, 8.4s; animation-delay: 0.9s, 0.7s; }
        .star:nth-child(10) { top: 50%; left: 62%; animation-duration: 5.4s, 10.5s; animation-delay: 0.1s, 0.2s; }
        .star:nth-child(11) { top: 20%; left: 42%; animation-duration: 4.1s, 7.8s; animation-delay: 0.5s, 0.6s; }
        .star:nth-child(12) { top: 78%; left: 18%; animation-duration: 6.7s, 10.2s; animation-delay: 0.2s, 0.8s; }
        .star:nth-child(13) { top: 62%; left: 90%; animation-duration: 5.2s, 9.5s; animation-delay: 1.1s, 0.3s; }
        .star:nth-child(14) { top: 42%; left: 10%; animation-duration: 3.9s, 8.1s; animation-delay: 0.6s, 0.4s; }
        .star:nth-child(15) { top: 90%; left: 60%; animation-duration: 6.9s, 10.7s; animation-delay: 0.4s, 0.7s; }
        @keyframes twinkle {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
        }
        @keyframes fall {
            0% { transform: translateY(0) translateX(0); opacity: 0.9; }
            70% { opacity: 0.9; }
            100% { transform: translateY(120vh) translateX(20px); opacity: 0; }
        }
        .login-card {
            position: relative;
            width: 100%;
            max-width: 820px;
            background: rgba(2, 8, 24, 0.88);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 36px;
            padding: 48px 46px 42px;
            backdrop-filter: blur(20px);
            box-shadow: 0 45px 100px rgba(0,0,0,0.35);
            overflow: hidden;
            z-index: 2;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: -48px;
            right: -48px;
            width: 160px;
            height: 160px;
            background: rgba(59, 130, 246, 0.18);
            border-radius: 50%;
            filter: blur(24px);
        }
        .login-card::after {
            content: '';
            position: absolute;
            bottom: -36px;
            left: -28px;
            width: 120px;
            height: 120px;
            background: rgba(168, 85, 247, 0.16);
            border-radius: 50%;
            filter: blur(18px);
        }
        .login-card h1 {
            font-size: 2.3rem;
            margin-bottom: 12px;
            letter-spacing: 0.02em;
        }
        .login-card p.description {
            margin-bottom: 32px;
            color: #cbd5e1;
            line-height: 1.75;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #94a3b8;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(15, 23, 42, 0.92);
            color: #eef2ff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-group input:focus {
            border-color: rgba(56, 189, 248, 0.9);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
        }
        .password-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);
            border: none;
            background: rgba(255,255,255,0.08);
            color: #f8fafc;
            font-size: 1.05rem;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: background 0.2s, transform 0.2s, color 0.2s;
        }
        .password-toggle:hover {
            background: rgba(56,189,248,0.24);
            transform: translateY(-50%) scale(1.05);
        }
        .password-wrapper.showing input {
            border-color: rgba(188, 148, 255, 0.95);
            box-shadow: inset 0 0 32px rgba(168, 85, 247, 0.24), 0 0 0 4px rgba(168, 85, 247, 0.14);
            background: rgba(139, 92, 246, 0.16);
        }
        .password-wrapper.showing::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(168, 85, 247, 0.06) 25%, rgba(168, 85, 247, 0.22) 50%, rgba(168, 85, 247, 0.06) 75%, transparent 100%);
            pointer-events: none;
            mix-blend-mode: screen;
        }
        .password-wrapper.showing .password-toggle {
            color: #f8fafc;
            background: rgba(168, 85, 247, 0.28);
        }
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .remember {
            font-size: 0.95rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .remember input { accent-color: #38bdf8; }
        .mode-switch {
            display: flex;
            gap: 14px;
            margin-bottom: 28px;
        }
        .mode-btn {
            flex: 1;
            padding: 14px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: #cbd5e1;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
        }
        .mode-btn.active {
            background: rgba(56,189,248,0.24);
            border-color: rgba(56,189,248,0.55);
            color: #ffffff;
        }
        .submit-btn {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 18px;
            font-size: 1rem;
            color: #0f172a;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 35px rgba(56,189,248,0.24);
        }
        .clear-btn {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid rgba(248, 113, 113, 0.35);
            border-radius: 18px;
            background: rgba(248, 113, 113, 0.08);
            color: #f8fafc;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            margin-top: 12px;
        }
        .clear-btn:hover {
            background: rgba(248, 113, 113, 0.16);
            border-color: rgba(248, 113, 113, 0.55);
        }
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(3, 7, 24, 0.75);
            backdrop-filter: blur(4px);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }
        .confirm-overlay.show {
            display: flex;
        }
        .confirm-box {
            width: 100%;
            max-width: 360px;
            background: rgba(6, 12, 32, 0.95);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 22px 60px rgba(0,0,0,0.35);
            color: #eef2ff;
        }
        .confirm-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .confirm-text {
            color: #cbd5e1;
            line-height: 1.7;
            margin-bottom: 24px;
        }
        .confirm-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .confirm-btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 16px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .confirm-btn.confirm {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: #fff;
        }
        .confirm-btn.cancel {
            background: rgba(255,255,255,0.08);
            color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .confirm-btn.cancel:hover {
            background: rgba(255,255,255,0.12);
        }
        .footer-note {
            margin-top: 18px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .footer-note strong {
            color: #fff;
        }
        .app-screen {
            position: relative;
            text-align: center;
            color: #e2e8f0;
            padding: 28px 24px 34px;
            display: grid;
            gap: 24px;
        }
        .app-screen h2 {
            margin-bottom: 6px;
            font-size: 2.2rem;
        }
        .app-screen p {
            color: #c7d2fe;
            line-height: 1.75;
            max-width: 560px;
            margin: 0 auto;
        }
        .app-screen .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 24px;
            margin-top: 10px;
        }
        .app-screen .menu-card {
            min-height: 180px;
            border-radius: 28px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 24px 50px rgba(99, 102, 241, 0.12);
            backdrop-filter: blur(8px);
        }
        .app-screen .menu-card span {
            background: rgba(15, 23, 42, 0.85);
            color: #f8fafc;
            padding: 16px 26px;
            border-radius: 999px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .admin-widget {
            position: absolute;
            top: 72px;
            right: 24px;
            width: auto;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
        }
        .admin-toggle-btn {
            width: 170px;
            padding: 12px 14px;
            border-radius: 999px;
            border: 1px solid rgba(167, 139, 250, 0.35);
            background: rgba(99, 102, 241, 0.14);
            color: #f8fafc;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s, border-color 0.2s;
        }
        .admin-toggle-btn:hover {
            transform: translateY(-1px);
            background: rgba(167, 139, 250, 0.25);
            border-color: rgba(167, 139, 250, 0.55);
        }
        .admin-ui {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: 300px;
            max-height: 420px;
            overflow: auto;
            padding: 18px;
            border-radius: 28px;
            background: rgba(6, 12, 32, 0.96);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(14px);
        }
        .admin-ui.show {
            display: block;
        }
        .admin-ui-header {
            margin-bottom: 14px;
            font-size: 1rem;
            font-weight: 700;
            color: #e2e8f0;
        }
        .admin-section {
            margin-bottom: 16px;
        }
        .admin-section:last-child {
            margin-bottom: 0;
        }
        .admin-title {
            margin-bottom: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #a5b4fc;
            letter-spacing: 0.01em;
        }
        .admin-users {
            display: grid;
            gap: 10px;
        }
        .admin-entry {
            padding: 12px 14px;
            border-radius: 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .admin-entry strong {
            display: inline-block;
            min-width: 70px;
            color: #cbd5e1;
            font-weight: 600;
        }
        .admin-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .admin-card {
            padding: 16px 14px;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(96, 165, 250, 0.18);
            text-align: center;
            color: #f8fafc;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .app-screen .admin-note {
            justify-self: center;
            color: #c4b5fd;
            font-size: 0.94rem;
        }
        @media (max-width: 840px) {
            .admin-widget {
                position: static;
                width: 100%;
            }
            .admin-ui {
                position: static;
                width: 100%;
            }
        }
        .app-screen .logout-btn {
            position: absolute;
            top: 22px;
            right: 22px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border: 1px solid rgba(248, 113, 113, 0.25);
            border-radius: 999px;
            background: rgba(248, 113, 113, 0.12);
            color: #f8fafc;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
            z-index: 2;
        }
        .app-screen .logout-btn:hover {
            transform: translateY(-1px);
            background: rgba(248, 113, 113, 0.18);
            border-color: rgba(248, 113, 113, 0.45);
        }
        @media (max-width: 840px) {
            .app-screen .menu-grid { grid-template-columns: 1fr; }
            .admin-widget { position: static; width: 100%; margin-top: 12px; }
        }
        @media (max-width: 720px) {
            .app-screen .choices { grid-template-columns: 1fr; }
        }
        .toast {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            color: #e2e8f0;
            padding: 12px 18px;
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(15,23,42,0.35);
            z-index: 10;
            opacity: 0;
            animation: toastIn 0.35s forwards;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        @media (max-width: 840px) {
            body { overflow-x: hidden; }
            .wrapper { padding: 16px; align-items: flex-start; }
            .login-card { max-width: 100%; padding: 36px 26px 30px; border-radius: 30px; }
            .login-card::before { width: 120px; height: 120px; top: -32px; right: -32px; }
            .login-card::after { width: 100px; height: 100px; bottom: -24px; left: -18px; }
            .mode-switch { flex-direction: column; gap: 12px; }
            .mode-btn { padding: 14px 16px; }
            .app-screen .menu-grid { grid-template-columns: 1fr; }
            .admin-widget { position: static; width: 100%; margin-top: 14px; }
        }
        @media (max-width: 600px) {
            body { overflow-y: auto; }
            .wrapper { padding: 12px; }
            .login-card { padding: 24px 18px 22px; }
            .login-card h1 { font-size: 1.6rem; }
            .login-card p.description { font-size: 0.95rem; }
            .input-group { margin-bottom: 16px; }
            .input-group label { font-size: 0.88rem; }
            .input-group input { padding: 12px 14px; }
            .action-row { flex-direction: column; align-items: stretch; gap: 10px; }
            .submit-btn, .clear-btn { width: 100%; }
            .password-toggle { width: 38px; height: 38px; right: 12px; }
            .app-screen .menu-card { min-height: 140px; }
            .app-screen .menu-card span { font-size: 1rem; padding: 14px 20px; }
            .admin-widget { min-height: 100px; }
            .confirm-box { padding: 18px; }
            .confirm-title { font-size: 1rem; }
            .confirm-text { font-size: 0.95rem; }
        }
        @media (max-width: 480px) {
            .login-card { padding: 22px 16px 18px; border-radius: 22px; }
            .login-card h1 { font-size: 1.5rem; }
            .mode-btn { font-size: 0.98rem; }
            .password-toggle { right: 10px; }
            .app-screen p { max-width: 100%; }
            .app-screen .admin-note { font-size: 0.88rem; }
        }
    </style>
</head>
<body>
    <div class="stars">
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
    </div>
    <div class="wrapper">
        <div class="login-card">
            <div class="mode-switch">
                <button type="button" class="mode-btn active" id="loginModeBtn">ล็อกอิน</button>
                <button type="button" class="mode-btn" id="registerModeBtn">สร้างรหัสใหม่</button>
            </div>
            <h1 id="formTitle">เข้าสู่ระบบ Galaxy</h1>
            <p class="description" id="formDescription">ล็อกอินเพื่อรับการแจ้งเตือนทางอีเมลหรือเบอร์โทรศัพท์ในอนาคต</p>
            <form id="authForm">
                <div class="input-group auth-name">
                    <label for="name">ชื่อ</label>
                    <input type="text" id="name" name="name" placeholder="เช่น สมชาย ใจดี">
                </div>
                <div class="input-group">
                    <label for="email">อีเมล</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com" required>
                </div>
                <div class="input-group auth-phone">
                    <label for="phone">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" name="phone" placeholder="0812345678">
                </div>
                <div class="input-group password-wrapper">
                    <label for="password">รหัสผ่าน</label>
                    <input type="password" id="password" name="password" placeholder="รหัสผ่านของคุณ" required>
                    <button type="button" class="password-toggle" id="togglePassword" aria-label="ดูรหัส"><i class="fas fa-eye"></i></button>
                </div>
                <div class="action-row">
                    <label class="remember"><input type="checkbox" id="rememberMe"> จดจำฉัน</label>
                </div>
                <button class="submit-btn" type="submit" id="submitBtn"><i class="fas fa-rocket"></i> เข้าสู่ระบบ</button>
                <button type="button" class="clear-btn" id="clearDataBtn">ล้างข้อมูลเก่า</button>
            </form>
            <div class="footer-note" id="footerNote">สร้างธีม Galaxy สดใสด้วยดาวเคลื่อนไหวและแสงนุ่ม ๆ</div>
        </div>
    </div>
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <div class="confirm-title">ล้างข้อมูลเก่า</div>
            <div class="confirm-text">คุณแน่ใจหรือไม่ว่าต้องการล้างข้อมูลเก่าทั้งหมด ข้อมูลบัญชีที่สร้างไว้จะถูกลบทิ้งและไม่สามารถกู้คืนได้</div>
            <div class="confirm-actions">
                <button class="confirm-btn confirm" id="confirmYes">แน่ใจ</button>
                <button class="confirm-btn cancel" id="confirmNo">ไม่</button>
            </div>
        </div>
    </div>
    <script>
        const userStorageKey = 'galaxyUserAccounts';
        const adminEmail = 'phatta2554@gmail.com';
        const adminPassword = 'galaxy001';
        let authMode = 'login';

        const authForm = document.getElementById('authForm');
        const loginModeBtn = document.getElementById('loginModeBtn');
        const registerModeBtn = document.getElementById('registerModeBtn');
        const formTitle = document.getElementById('formTitle');
        const formDescription = document.getElementById('formDescription');
        const submitBtn = document.getElementById('submitBtn');
        const footerNote = document.getElementById('footerNote');
        const nameField = document.getElementById('name');
        const phoneField = document.getElementById('phone');
        const passwordField = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const nameGroup = document.querySelector('.auth-name');
        const phoneGroup = document.querySelector('.auth-phone');
        const wrapper = document.querySelector('.wrapper');

        function getUsers() {
            return JSON.parse(localStorage.getItem(userStorageKey) || '{}');
        }

        function saveUsers(users) {
            localStorage.setItem(userStorageKey, JSON.stringify(users));
        }

        function setMode(mode) {
            authMode = mode;
            loginModeBtn.classList.toggle('active', mode === 'login');
            registerModeBtn.classList.toggle('active', mode === 'register');
            if (mode === 'login') {
                formTitle.textContent = 'เข้าสู่ระบบ Galaxy';
                formDescription.textContent = 'ใส่อีเมลและรหัสผ่านของคุณเพื่อเข้าสู่ระบบ';
                submitBtn.innerHTML = '<i class="fas fa-rocket"></i> เข้าสู่ระบบ';
                nameGroup.style.display = 'none';
                phoneGroup.style.display = 'none';
                nameField.required = false;
                phoneField.required = false;
            } else {
                formTitle.textContent = 'สร้างบัญชีใหม่';
                formDescription.textContent = 'สร้างรหัสใหม่เพื่อใช้งานและรับการแจ้งเตือนในอนาคต';
                submitBtn.innerHTML = '<i class="fas fa-star"></i> ลงทะเบียน';
                nameGroup.style.display = 'block';
                phoneGroup.style.display = 'block';
                nameField.required = true;
                phoneField.required = true;
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3200);
        }

        function showAppScreen(user) {
            const isAdmin = user.email === adminEmail;
            const savedUsers = getUsers();
            const userList = Object.values(savedUsers).map(account => `
                <div class="admin-entry">
                    <div><strong>ชื่อ:</strong> ${account.name}</div>
                    <div><strong>รหัส:</strong> ${account.password}</div>
                    <div><strong>เบอร์:</strong> ${account.phone}</div>
                    <div><strong>อีเมล:</strong> ${account.email}</div>
                </div>
            `).join('') || '<div class="admin-entry">ยังไม่มีผู้ใช้งานในระบบ</div>';

            wrapper.innerHTML = `
                <div class="login-card app-screen">
                    <button type="button" class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
                    <h2>ยินดีต้อนรับ ${user.name}</h2>
                    <p>คุณเข้าสู่ระบบเรียบร้อยแล้ว หน้านี้เป็น UI เปล่า ๆ ให้กดไปก่อนเพื่อพัฒนาต่อ</p>
                    <div class="menu-grid">
                        <div class="menu-card"><span>กิจกรรม</span></div>
                        <div class="menu-card"><span>ไม่ใช่กิจกรรม</span></div>
                    </div>
                    <div class="admin-widget" style="${isAdmin ? '' : 'display:none;'}">
                        <button type="button" class="admin-toggle-btn" id="adminToggleBtn"><i class="fas fa-user-shield"></i> เมนูแอดมิน</button>
                        <div class="admin-ui" id="adminUI">
                            <div class="admin-ui-header">เมนูแอดมิน</div>
                            <div class="admin-section">
                                <div class="admin-title">คนเข้าเว็บ</div>
                                <div class="admin-users">${userList}</div>
                            </div>
                            <div class="admin-section">
                                <div class="admin-title">เมนูแยก</div>
                                <div class="admin-actions">
                                    <div class="admin-card">กิจกรรม</div>
                                    <div class="admin-card">ไม่ใช่กิจกรรม</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="admin-note">${isAdmin ? 'กดเมนูแอดมินเพื่อดูผู้เข้าเว็บและเมนูแยกกิจกรรม' : 'เมนูแอดมินสำหรับผู้ดูแลระบบเท่านั้น'}</div>
                </div>`;

            document.getElementById('logoutBtn').addEventListener('click', function() {
                showConfirm('logout');
            });

            const adminToggleBtn = document.getElementById('adminToggleBtn');
            const adminUI = document.getElementById('adminUI');
            if (adminToggleBtn && adminUI) {
                adminToggleBtn.addEventListener('click', function() {
                    adminUI.classList.toggle('show');
                });
            }
        }

        loginModeBtn.addEventListener('click', () => setMode('login'));
        registerModeBtn.addEventListener('click', () => setMode('register'));

        const confirmOverlay = document.getElementById('confirmOverlay');
        const confirmTitle = document.querySelector('.confirm-title');
        const confirmText = document.querySelector('.confirm-text');
        const confirmYes = document.getElementById('confirmYes');
        const confirmNo = document.getElementById('confirmNo');
        let pendingConfirmAction = null;

        function showConfirm(action) {
            pendingConfirmAction = action;
            if (action === 'logout') {
                confirmTitle.textContent = 'ยืนยันออกจากระบบ';
                confirmText.textContent = 'แน่ใจจะล็อกเอ้ามั้ย';
                confirmYes.textContent = 'ตกลง';
            } else {
                confirmTitle.textContent = 'ล้างข้อมูลเก่า';
                confirmText.textContent = 'คุณแน่ใจหรือไม่ว่าต้องการล้างข้อมูลเก่าทั้งหมด ข้อมูลบัญชีที่สร้างไว้จะถูกลบทิ้งและไม่สามารถกู้คืนได้';
                confirmYes.textContent = 'แน่ใจ';
            }
            confirmOverlay.classList.add('show');
        }

        function hideConfirm() {
            confirmOverlay.classList.remove('show');
            pendingConfirmAction = null;
        }

        document.getElementById('clearDataBtn').addEventListener('click', function() {
            showConfirm('clear');
        });

        confirmNo.addEventListener('click', function() {
            hideConfirm();
        });

        confirmOverlay.addEventListener('click', function(event) {
            if (event.target === confirmOverlay) hideConfirm();
        });

        confirmYes.addEventListener('click', function() {
            if (pendingConfirmAction === 'logout') {
                hideConfirm();
                showToast('ออกจากระบบแล้ว');
                setTimeout(() => location.reload(), 400);
                return;
            }
            localStorage.removeItem(userStorageKey);
            authForm.reset();
            setMode('login');
            hideConfirm();
            showToast('ล้างข้อมูลเก่าเรียบร้อยแล้ว');
        });

        togglePassword.addEventListener('click', function() {
            const show = passwordField.type === 'password';
            passwordField.type = show ? 'text' : 'password';
            this.innerHTML = show ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
            this.setAttribute('aria-label', show ? 'ซ่อนรหัส' : 'ดูรหัส');
            this.closest('.password-wrapper').classList.toggle('showing', show);
        });

        authForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const name = nameField.value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = phoneField.value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                showToast('กรุณากรอกอีเมลและรหัสผ่าน');
                return;
            }
            const users = getUsers();
            if (authMode === 'register') {
                if (!name || !phone) {
                    showToast('กรุณากรอกชื่อและเบอร์โทรศัพท์');
                    return;
                }
                if (email === adminEmail) {
                    showToast('อีเมลนี้สงวนไว้สำหรับแอดมิน ไม่สามารถสร้างบัญชีได้');
                    setMode('login');
                    return;
                }
                if (users[email]) {
                    showToast('อีเมลนี้ถูกใช้งานแล้ว โปรดลองล็อกอิน');
                    setMode('login');
                    return;
                }
                users[email] = { name, email, phone, password };
                saveUsers(users);
                showToast('สร้างบัญชีเรียบร้อยแล้ว ล็อกอินได้ทันที');
                setMode('login');
                authForm.reset();
                return;
            }
            let user = users[email];
            if (!user && email === adminEmail && password === adminPassword) {
                user = { name: 'Galaxy Admin', email, password };
            }
            if (!user || user.password !== password) {
                showToast('อีเมลหรือรหัสผ่านไม่ถูกต้อง');
                return;
            }
            showToast(`ยินดีต้อนรับกลับ ${user.name}`);
            setTimeout(() => showAppScreen(user), 600);
        });

        setMode('login');
    </script>
</body>
</html>
